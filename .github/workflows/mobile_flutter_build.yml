name: Flutter Mobile Build

on:
  workflow_call:
    # ------------------------------------------------------------
    # Inputs
    # ------------------------------------------------------------
    inputs:
      flutter_version:
        type: string
        default: "3.19.6"

      platform:
        type: string
        default: "android" # android | ios | both

      build_type:
        type: string
        default: "release" # debug | release

      android_output:
        type: string
        default: "apk" # apk | appbundle

      working_directory:
        type: string
        default: "."

      dotenv_target_path:
        type: string
        default: ".env"

      # NEW: Flutter build flavor (e.g. "prod", "dev", "stg"). Empty = no flavor.
      flavor:
        type: string
        default: ""

      # NEW: Dart entry point file (e.g. "lib/main_prod.dart"). Empty = default lib/main.dart.
      target:
        type: string
        default: ""

      ios_codesign:
        type: boolean
        default: false

      ios_bundle_id:
        type: string
        default: "com.eranin.etask"

      # Optional: export method (app-store | ad-hoc | development)
      ios_export_method:
        type: string
        default: "app-store"

    # ------------------------------------------------------------
    # Secrets
    # ------------------------------------------------------------
    secrets:
      ENV_PROD_BASE64:
        required: false

      ANDROID_GOOGLE_SERVICES_JSON_BASE64:
        required: false
      IOS_GOOGLESERVICE_INFO_PLIST_BASE64:
        required: false
      IOS_GOOGLEOAUTH_PLIST_BASE64:
        required: false

      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEY_PROPERTIES_BASE64:
        required: false

      IOS_P12_BASE64:
        required: false
      IOS_P12_PASSWORD:
        required: false
      IOS_MOBILEPROVISION_BASE64:
        required: false
      IOS_KEYCHAIN_PASSWORD:
        required: false

      IOS_EXPORT_OPTIONS_PLIST_BASE64:
        required: false

    outputs:
      build_version:
        value: ${{ jobs.meta.outputs.version }}

permissions:
  contents: read

jobs:
  # =============================================================
  # META: Versioning
  # =============================================================
  meta:
    runs-on: self-hosted
    outputs:
      version: ${{ steps.version.outputs.version }}
      count: ${{ steps.version.outputs.count }}
      date: ${{ steps.version.outputs.date }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate Build Version
        id: version
        shell: bash
        run: |
          DATE=$(date +%Y%m%d)
          COUNT=$(git rev-list --count HEAD)
          VERSION="${DATE}.${COUNT}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION"

  # =============================================================
  # ANDROID BUILD
  # =============================================================
  android:
    if: inputs.platform == 'android' || inputs.platform == 'both'
    runs-on: self-hosted
    needs: meta

    steps:
      - uses: actions/checkout@v5

      - name: Setup Java (Android)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          cache: true

      - name: Inject .env (optional)
        shell: bash
        run: |
          if [ -z "$ENV_B64" ]; then
            echo "No ENV_PROD_BASE64 provided, skipping .env injection"
            exit 0
          fi
          python3 - <<'PY'
          import os, base64, pathlib
          wd = pathlib.Path(os.environ["WD"])
          target = wd / os.environ["DOTENV_TARGET"]
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_bytes(base64.b64decode(os.environ["ENV_B64"]))
          print(f"Wrote env file to: {target}")
          PY
        env:
          WD: ${{ inputs.working_directory }}
          DOTENV_TARGET: ${{ inputs.dotenv_target_path }}
          ENV_B64: ${{ secrets.ENV_PROD_BASE64 }}

      - name: Inject google-services.json (optional)
        shell: bash
        run: |
          if [ -z "$GS_B64" ]; then
            echo "No ANDROID_GOOGLE_SERVICES_JSON_BASE64 provided, skipping"
            exit 0
          fi
          python3 - <<'PY'
          import os, base64, pathlib
          wd = pathlib.Path(os.environ["WD"])
          target = wd / "android/app/google-services.json"
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_bytes(base64.b64decode(os.environ["GS_B64"]))
          print(f"Wrote: {target}")
          PY
        env:
          WD: ${{ inputs.working_directory }}
          GS_B64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}

      - name: Inject Android signing (optional - release only)
        if: inputs.build_type == 'release'
        shell: bash
        run: |
          if [ -z "$KP_B64" ] || [ -z "$JKS_B64" ]; then
            echo "No Android signing secrets provided, skipping"
            exit 0
          fi
          python3 - <<'PY'
          import os, base64, pathlib
          wd = pathlib.Path(os.environ["WD"])

          # key.properties -> android/key.properties
          kp = wd / "android/key.properties"
          kp.parent.mkdir(parents=True, exist_ok=True)
          kp.write_bytes(base64.b64decode(os.environ["KP_B64"]))

          # Write keystore to BOTH locations so it works regardless of
          # whether key.properties uses storeFile=key.jks (rootProject = android/)
          # or storeFile=app/key.jks
          jks1 = wd / "android/app/key.jks"
          jks1.parent.mkdir(parents=True, exist_ok=True)
          jks1.write_bytes(base64.b64decode(os.environ["JKS_B64"]))

          jks2 = wd / "android/key.jks"
          jks2.parent.mkdir(parents=True, exist_ok=True)
          jks2.write_bytes(base64.b64decode(os.environ["JKS_B64"]))

          print(f"Wrote: {kp}")
          print(f"Wrote: {jks1}")
          print(f"Wrote: {jks2}")
          PY
        env:
          WD: ${{ inputs.working_directory }}
          KP_B64: ${{ secrets.ANDROID_KEY_PROPERTIES_BASE64 }}
          JKS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Flutter clean (defensive against stale build dirs)
        working-directory: ${{ inputs.working_directory }}
        run: flutter clean

      - name: Inspect Gradle config (diagnostic)
        working-directory: ${{ inputs.working_directory }}
        shell: bash
        run: |
          echo "===== Detected flavors / signing config ====="
          grep -nE "flavorDimensions|productFlavors|signingConfig|archivesBaseName|applicationIdSuffix" \
            android/app/build.gradle android/app/build.gradle.kts \
            android/build.gradle  android/build.gradle.kts \
            2>/dev/null || echo "(no relevant config found)"
          echo ""
          echo "===== Inputs ====="
          echo "flavor:        '${{ inputs.flavor }}'"
          echo "target:        '${{ inputs.target }}'"
          echo "android_output: ${{ inputs.android_output }}"
          echo "build_type:    ${{ inputs.build_type }}"

      - name: Install Dependencies
        working-directory: ${{ inputs.working_directory }}
        run: flutter pub get

      # ----------------------------------------------------------
      # Build Android with explicit flavor + target support.
      # Auto-recovery is kept as a safety net only.
      # ----------------------------------------------------------
      - name: Build Android
        id: android_build
        working-directory: ${{ inputs.working_directory }}
        shell: bash
        run: |
          set +e

          # Build the flutter command with optional --flavor and -t
          ARGS="--${{ inputs.build_type }}"
          if [ -n "${{ inputs.flavor }}" ]; then
            ARGS="$ARGS --flavor=${{ inputs.flavor }}"
          fi
          if [ -n "${{ inputs.target }}" ]; then
            ARGS="$ARGS -t ${{ inputs.target }}"
          fi

          if [ "${{ inputs.android_output }}" = "appbundle" ]; then
            CMD="flutter build appbundle $ARGS"
            EXT="aab"
          else
            CMD="flutter build apk $ARGS"
            EXT="apk"
          fi

          echo "Running: $CMD"
          eval $CMD 2>&1 | tee build.log
          FLUTTER_RC=${PIPESTATUS[0]}
          set -e

          if [ "$FLUTTER_RC" -eq 0 ]; then
            echo "Flutter build succeeded."
            exit 0
          fi

          echo ""
          echo "Flutter build exited with code $FLUTTER_RC. Checking if Gradle actually produced the artifact..."

          # Restrict the search by flavor if one was specified, to avoid
          # picking up the wrong flavor's output.
          if [ -n "${{ inputs.flavor }}" ]; then
            FLAVOR_PATTERN="*${{ inputs.flavor }}*"
            FOUND=$(find . -type f -name "*.${EXT}" -path "*${FLAVOR_PATTERN}*" -not -path "*/.dart_tool/*" 2>/dev/null | head -n 5)
          else
            FOUND=$(find . -type f -name "*.${EXT}" -not -path "*/.dart_tool/*" 2>/dev/null | head -n 5)
          fi

          if [ -z "$FOUND" ]; then
            echo "No matching .${EXT} files found - this is a real Gradle failure."
            echo "----- last 80 lines of build.log -----"
            tail -n 80 build.log || true
            exit "$FLUTTER_RC"
          fi

          echo "Found artifact(s):"
          echo "$FOUND"

          if ! grep -q "Gradle build failed to produce an .${EXT} file" build.log; then
            echo "Failure does not look like the known path-lookup issue. Aborting."
            exit "$FLUTTER_RC"
          fi

          # Copy to canonical location for downstream upload step
          FIRST=$(echo "$FOUND" | head -n 1)
          if [ "$EXT" = "aab" ]; then
            CANON_DIR="build/app/outputs/bundle/release"
            CANON_FILE="$CANON_DIR/app-release.aab"
          else
            CANON_DIR="build/app/outputs/flutter-apk"
            CANON_FILE="$CANON_DIR/app-release.apk"
          fi

          mkdir -p "$CANON_DIR"
          if [ "$(realpath "$FIRST")" != "$(realpath "$CANON_FILE" 2>/dev/null || echo "")" ]; then
            cp -f "$FIRST" "$CANON_FILE"
            echo "Copied $FIRST -> $CANON_FILE"
          fi
          echo "Auto-recovery succeeded."

      - name: Verify AAB is signed with release key
        if: inputs.build_type == 'release' && inputs.android_output == 'appbundle'
        working-directory: ${{ inputs.working_directory }}
        shell: bash
        run: |
          # Find AABs that match the requested flavor (if any), else any release AAB
          if [ -n "${{ inputs.flavor }}" ]; then
            AAB=$(find build -type f -name "*.aab" -path "*${{ inputs.flavor }}*" 2>/dev/null | head -n 1)
          fi
          if [ -z "$AAB" ]; then
            AAB=$(find build -type f -name "*.aab" -path "*release*" 2>/dev/null | head -n 1)
          fi
          if [ -z "$AAB" ]; then
            echo "No AAB found to verify."
            exit 1
          fi

          echo "Inspecting: $AAB"
          # Extract certificate info from the AAB's signature
          CERT_INFO=$(unzip -p "$AAB" "META-INF/*.RSA" 2>/dev/null \
            | keytool -printcert 2>&1 || true)
          echo "$CERT_INFO"

          if echo "$CERT_INFO" | grep -qi "CN=Android Debug"; then
            echo ""
            echo "ERROR: AAB is signed with the DEBUG key. Play Console will reject this."
            echo "Check that android/app/build.gradle.kts has signingConfigs.release"
            echo "and that ANDROID_KEY_PROPERTIES_BASE64 + ANDROID_KEYSTORE_BASE64 are set."
            exit 1
          fi
          echo ""
          echo "OK: AAB is signed with a non-debug key."

      - name: Locate Android output (always)
        if: always()
        working-directory: ${{ inputs.working_directory }}
        shell: bash
        run: |
          echo "===== All AAB / APK files in workspace ====="
          find . -type f \( -name "*.aab" -o -name "*.apk" \) -not -path "*/.dart_tool/*" 2>/dev/null || true
          echo ""
          echo "===== build/app/outputs (if present) ====="
          find build/app/outputs -maxdepth 6 2>/dev/null || echo "(does not exist)"

      - name: Upload Android Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-${{ needs.meta.outputs.version }}${{ inputs.flavor != '' && format('-{0}', inputs.flavor) || '' }}
          path: |
            ${{ inputs.working_directory }}/**/build/**/outputs/**/*.apk
            ${{ inputs.working_directory }}/**/build/**/outputs/**/*.aab
          if-no-files-found: error

  # =============================================================
  # IOS BUILD
  # =============================================================
  ios:
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    runs-on: macos-latest
    needs: meta

    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          cache: true

      - name: Inject .env (optional)
        shell: bash
        run: |
          if [ -z "$ENV_B64" ]; then
            echo "No ENV_PROD_BASE64 provided, skipping .env injection"
            exit 0
          fi
          python3 - <<'PY'
          import os, base64, pathlib
          wd = pathlib.Path(os.environ["WD"])
          target = wd / os.environ["DOTENV_TARGET"]
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_bytes(base64.b64decode(os.environ["ENV_B64"]))
          print(f"Wrote env file to: {target}")
          PY
        env:
          WD: ${{ inputs.working_directory }}
          DOTENV_TARGET: ${{ inputs.dotenv_target_path }}
          ENV_B64: ${{ secrets.ENV_PROD_BASE64 }}

      - name: Inject GoogleService-Info.plist (optional)
        shell: bash
        run: |
          if [ -z "$PLIST_B64" ]; then
            echo "No IOS_GOOGLESERVICE_INFO_PLIST_BASE64 provided, skipping"
            exit 0
          fi
          python3 - <<'PY'
          import os, base64, pathlib
          wd = pathlib.Path(os.environ["WD"])
          target = wd / "ios/Runner/GoogleService-Info.plist"
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_bytes(base64.b64decode(os.environ["PLIST_B64"]))
          print(f"Wrote: {target}")
          PY
        env:
          WD: ${{ inputs.working_directory }}
          PLIST_B64: ${{ secrets.IOS_GOOGLESERVICE_INFO_PLIST_BASE64 }}

      - name: Inject GoogleOAuth.plist (optional)
        shell: bash
        run: |
          if [ -z "$PLIST_B64" ]; then
            echo "No IOS_GOOGLEOAUTH_PLIST_BASE64 provided, skipping"
            exit 0
          fi
          python3 - <<'PY'
          import os, base64, pathlib
          wd = pathlib.Path(os.environ["WD"])
          target = wd / "ios/Runner/GoogleOAuth.plist"
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_bytes(base64.b64decode(os.environ["PLIST_B64"]))
          print(f"Wrote: {target}")
          PY
        env:
          WD: ${{ inputs.working_directory }}
          PLIST_B64: ${{ secrets.IOS_GOOGLEOAUTH_PLIST_BASE64 }}

      - name: Install Dependencies
        working-directory: ${{ inputs.working_directory }}
        run: flutter pub get

      # -------------------------
      # iOS Codesign (optional)
      # -------------------------
      - name: Install iOS cert & provisioning (optional)
        id: ios_signing
        if: inputs.ios_codesign && inputs.build_type == 'release'
        shell: bash
        run: |
          if [ -z "$P12_B64" ] || [ -z "$MP_B64" ] || [ -z "$IOS_KEYCHAIN_PASSWORD" ]; then
            echo "iOS signing secrets not fully provided, skipping signing setup"
            echo "signing_configured=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          set -euo pipefail

          KEYCHAIN_NAME="build.keychain"
          KEYCHAIN_PATH="$HOME/Library/Keychains/${KEYCHAIN_NAME}-db"

          security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null || true

          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          security list-keychains -d user -s "$KEYCHAIN_NAME" login.keychain-db
          security default-keychain -s "$KEYCHAIN_NAME"

          # Decode P12 (handles single OR double base64 encoding)
          python3 - <<'PY'
          import os, base64, pathlib, sys

          raw = "".join(os.environ["P12_B64"].split())
          try:
              data = base64.b64decode(raw, validate=False)
          except Exception as e:
              print(f"ERROR: IOS_P12_BASE64 not valid base64: {e}", file=sys.stderr)
              sys.exit(1)

          if data[:3] == b"MII":
              print("Detected double-base64 encoding in IOS_P12_BASE64 - decoding once more")
              data = base64.b64decode(data, validate=False)

          if data[:2] != b"\x30\x82":
              print(f"WARNING: decoded P12 does not start with DER magic 30 82 (got {data[:2].hex()})", file=sys.stderr)

          p = pathlib.Path("cert.p12")
          p.write_bytes(data)
          print(f"Wrote cert.p12 ({p.stat().st_size} bytes)")
          PY

          echo "===== P12 Diagnostics ====="
          file cert.p12
          echo "OpenSSL parse check:"
          if ! openssl pkcs12 -in cert.p12 -info -nokeys -passin "pass:$IOS_P12_PASSWORD" -legacy >/dev/null 2>&1; then
            if ! openssl pkcs12 -in cert.p12 -info -nokeys -passin "pass:$IOS_P12_PASSWORD" >/dev/null 2>&1; then
              echo "ERROR: openssl could not parse cert.p12 with the provided password."
              exit 1
            fi
          fi
          echo "P12 looks valid."

          security import cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_P12_PASSWORD" \
            -f pkcs12 \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "===== Identities in keychain ====="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true

          # Decode mobileprovision (also auto-detects double-base64)
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          python3 - <<'PY'
          import os, base64, pathlib, sys
          raw = "".join(os.environ["MP_B64"].split())
          data = base64.b64decode(raw, validate=False)
          if data[:3] == b"MII":
              print("Detected double-base64 encoding in IOS_MOBILEPROVISION_BASE64 - decoding once more")
              data = base64.b64decode(data, validate=False)
          p = pathlib.Path("profile.mobileprovision")
          p.write_bytes(data)
          print(f"Wrote profile.mobileprovision ({p.stat().st_size} bytes)")
          PY

          PROFILE_UUID=$(security cms -D -i profile.mobileprovision \
            | python3 -c "import sys, plistlib; print(plistlib.loads(sys.stdin.buffer.read())['UUID'])")
          cp profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          echo "Installed provisioning profile: ${PROFILE_UUID}"

          rm -f cert.p12 profile.mobileprovision

          echo "signing_configured=true" >> $GITHUB_OUTPUT
        env:
          P12_B64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          MP_B64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}

      - name: Prepare ExportOptions.plist (optional)
        if: inputs.ios_codesign && inputs.build_type == 'release'
        shell: bash
        run: |
          if [ "${{ steps.ios_signing.outputs.signing_configured }}" != "true" ]; then
            echo "Signing not configured, skipping ExportOptions.plist"
            exit 0
          fi

          set -euo pipefail
          WD="${{ inputs.working_directory }}"
          TARGET="$WD/ios/ExportOptions.plist"
          mkdir -p "$WD/ios"

          if [ -n "$PLIST_B64" ]; then
            python3 - <<'PY'
          import os, base64, pathlib
          target = pathlib.Path(os.environ["TARGET"])
          target.write_bytes(base64.b64decode(os.environ["PLIST_B64"]))
          print(f"Wrote ExportOptions: {target}")
          PY
          else
            python3 - <<'PY'
          import os, pathlib
          method = os.environ["METHOD"]
          bundle_id = os.environ["BUNDLE_ID"]
          target = pathlib.Path(os.environ["TARGET"])

          content = f'''<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>{method}</string>
            <key>signingStyle</key><string>manual</string>
            <key>stripSwiftSymbols</key><true/>
            <key>compileBitcode</key><false/>
            <key>destination</key><string>export</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>{bundle_id}</key><string></string>
            </dict>
          </dict>
          </plist>
          '''
          target.write_text(content)
          print(f"Generated ExportOptions: {target}")
          PY
          fi
        env:
          TARGET: ${{ inputs.working_directory }}/ios/ExportOptions.plist
          PLIST_B64: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
          METHOD: ${{ inputs.ios_export_method }}
          BUNDLE_ID: ${{ inputs.ios_bundle_id }}

      - name: Build iOS (Signed)
        if: inputs.ios_codesign && inputs.build_type == 'release' && steps.ios_signing.outputs.signing_configured == 'true'
        working-directory: ${{ inputs.working_directory }}
        shell: bash
        run: |
          ARGS="--release --export-options-plist=ios/ExportOptions.plist"
          if [ -n "${{ inputs.flavor }}" ]; then
            ARGS="$ARGS --flavor=${{ inputs.flavor }}"
          fi
          if [ -n "${{ inputs.target }}" ]; then
            ARGS="$ARGS -t ${{ inputs.target }}"
          fi
          echo "Running: flutter build ipa $ARGS"
          flutter build ipa $ARGS

      - name: Build iOS (No Codesign)
        if: "!inputs.ios_codesign || inputs.build_type != 'release' || steps.ios_signing.outputs.signing_configured != 'true'"
        working-directory: ${{ inputs.working_directory }}
        shell: bash
        run: |
          ARGS="--${{ inputs.build_type }} --no-codesign"
          if [ -n "${{ inputs.flavor }}" ]; then
            ARGS="$ARGS --flavor=${{ inputs.flavor }}"
          fi
          if [ -n "${{ inputs.target }}" ]; then
            ARGS="$ARGS -t ${{ inputs.target }}"
          fi
          echo "Running: flutter build ios $ARGS"
          flutter build ios $ARGS

      - name: Upload iOS Artifact (IPA)
        if: inputs.ios_codesign && inputs.build_type == 'release' && steps.ios_signing.outputs.signing_configured == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ios-${{ needs.meta.outputs.version }}${{ inputs.flavor != '' && format('-{0}', inputs.flavor) || '' }}
          path: |
            **/build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Upload iOS Artifact (No Codesign)
        if: "!inputs.ios_codesign || inputs.build_type != 'release' || steps.ios_signing.outputs.signing_configured != 'true'"
        uses: actions/upload-artifact@v7
        with:
          name: ios-${{ needs.meta.outputs.version }}${{ inputs.flavor != '' && format('-{0}', inputs.flavor) || '' }}
          path: |
            **/build/ios/iphoneos/*.app
          if-no-files-found: warn

      - name: Cleanup Keychain
        if: always() && inputs.ios_codesign && inputs.build_type == 'release'
        shell: bash
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision 2>/dev/null || true
          echo "Cleanup done"
